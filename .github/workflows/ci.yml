name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          pip install -r ingest/requirements.txt
          pip install pytest

      - name: Run extractor tests
        run: pytest ingest/tests/ -v

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dashboard deps
        working-directory: dashboard
        run: npm ci --force

      - name: Run dashboard tests
        working-directory: dashboard
        run: npx vitest run

  lint-dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: pip install dbt-core==1.8.7 dbt-postgres==1.8.2

      - name: dbt deps
        working-directory: transform
        run: dbt deps --profiles-dir .

      - name: dbt parse (syntax check)
        working-directory: transform
        run: dbt parse --profiles-dir .

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build pipeline image
        run: docker build -f infra/docker/pipeline.Dockerfile .

      - name: Build API image
        run: docker build -f api/Dockerfile api/

      - name: Build dashboard image
        run: docker build -f dashboard/Dockerfile dashboard/
