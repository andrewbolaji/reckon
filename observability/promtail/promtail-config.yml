server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
  # To forward logs to Splunk HEC, add a second client:
  #
  # - url: ${SPLUNK_HEC_URL:-http://splunk:8088/services/collector}
  #   headers:
  #     Authorization: "Splunk ${SPLUNK_HEC_TOKEN}"
  #   tenant_id: reckon
  #
  # Set SPLUNK_HEC_URL and SPLUNK_HEC_TOKEN in .env to enable.

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=reckon"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
