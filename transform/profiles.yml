reckon:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'warehouse') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'reckon') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD', 'reckon_dev') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'reckon') }}"
      schema: public
      threads: 4
    prod:
      type: redshift
      host: "{{ env_var('REDSHIFT_HOST') }}"
      port: "{{ env_var('REDSHIFT_PORT', '5439') | int }}"
      user: "{{ env_var('REDSHIFT_USER') }}"
      pass: "{{ env_var('REDSHIFT_PASSWORD') }}"
      dbname: "{{ env_var('REDSHIFT_DB', 'reckon') }}"
      schema: public
      threads: 4
