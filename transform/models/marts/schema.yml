version: 2

models:
  - name: mart_call_funnel
    description: >
      Daily call-funnel metrics from Aria: total calls, qualified leads,
      bookings, escalations, conversion rates, and job completion counts.
    columns:
      - name: call_date
        tests:
          - not_null
          - unique
      - name: total_calls
        tests:
          - not_null
      - name: booking_rate_pct
        description: "Percentage of calls that resulted in a booking"

  - name: mart_revenue
    description: >
      Daily revenue aggregation by service and payment method,
      including refunds and net revenue.
    columns:
      - name: payment_date
        tests:
          - not_null
      - name: revenue_dollars
        tests:
          - not_null

  - name: mart_jobs
    description: >
      Job completion metrics by service category: total jobs,
      completion rate, and revenue per completed job.
    columns:
      - name: service_category
        tests:
          - not_null
          - unique
      - name: total_jobs
        tests:
          - not_null
      - name: completion_rate_pct
        description: "Percentage of jobs that reached completed status"
