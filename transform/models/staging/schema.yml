version: 2

models:
  - name: stg_aria_calls
    description: "Cleaned and typed Aria call records"
    columns:
      - name: call_id
        tests:
          - not_null
          - unique
      - name: call_timestamp
        tests:
          - not_null
      - name: urgency
        tests:
          - accepted_values:
              values: ["low", "medium", "high", "critical"]
      - name: outcome
        tests:
          - accepted_values:
              values: ["booked", "qualified", "escalated", "missed", "resolved"]

  - name: stg_stripe_payments
    description: "Cleaned and typed Stripe payment records (failed payments excluded)"
    columns:
      - name: payment_id
        tests:
          - not_null
          - unique
      - name: amount_cents
        tests:
          - not_null

  - name: stg_jobs
    description: "Cleaned and typed job records from MongoDB"
    columns:
      - name: job_id
        tests:
          - not_null
          - unique
      - name: related_call_id
        description: "1:1 with booked Aria calls. Unique enforced by test."
        tests:
          - not_null
          - unique
      - name: job_status
        tests:
          - accepted_values:
              values: ["scheduled", "completed", "cancelled"]
      - name: job_value
        tests:
          - not_null
