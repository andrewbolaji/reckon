version: 2

sources:
  - name: raw
    schema: raw
    # "raw" is a reserved word in Amazon Redshift; quote the schema so source
    # refs and freshness checks emit "raw".<table> instead of a syntax error.
    quoting:
      schema: true
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 48, period: hour}
    loaded_at_field: "_loaded_at"
    tables:
      - name: aria_calls
        description: "Raw Aria AI voice-agent call records"
        columns:
          - name: call_id
            tests:
              - not_null
              - unique
          - name: timestamp
            tests:
              - not_null
          - name: urgency
            tests:
              - accepted_values:
                  values: ["low", "medium", "high", "critical"]
          - name: outcome
            tests:
              - accepted_values:
                  values: ["booked", "qualified", "escalated", "missed", "resolved"]

      - name: stripe_payments
        description: "Raw Stripe-style payment transaction records"
        columns:
          - name: payment_id
            tests:
              - not_null
              - unique
          - name: timestamp
            tests:
              - not_null
          - name: status
            tests:
              - accepted_values:
                  values: ["succeeded", "refunded", "failed"]

      - name: jobs
        description: "Raw job records from MongoDB"
        loaded_at_field: "_loaded_at"
        columns:
          - name: job_id
            tests:
              - not_null
              - unique
          - name: related_call_id
            tests:
              - not_null
          - name: status
            tests:
              - accepted_values:
                  values: ["scheduled", "completed", "cancelled"]
