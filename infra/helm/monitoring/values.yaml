# kube-prometheus-stack values for the Reckon EKS cluster.
#
# Committed and version-controlled — NEVER click-configured. Installed by
# `make monitoring` into the `monitoring` namespace:
#
#   helm upgrade --install kps prometheus-community/kube-prometheus-stack \
#     -n monitoring -f infra/helm/monitoring/values.yaml
#
# Sizing note: this targets a lean 2x t3.medium demo cluster (stand up, verify,
# screenshot, tear down). Storage is ephemeral (emptyDir) on purpose — no EBS
# CSI driver or PVCs required, and the whole stack disappears cleanly on teardown.
#
# Secrets note: SMTP credentials, the alert recipient, and the Grafana admin
# password are NOT committed. They are injected at install time via `--set`
# from environment variables (see the `monitoring` target in the Makefile).
# The values below are inert placeholders.

fullnameOverride: kps

# ---------------------------------------------------------------------------
# EKS control plane: the managed components below are NOT scrapable on EKS
# (AWS runs them and does not expose their metrics endpoints). Leaving their
# ServiceMonitors enabled just produces permanently-down targets, so disable.
# ---------------------------------------------------------------------------
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

# ---------------------------------------------------------------------------
# Prometheus
# ---------------------------------------------------------------------------
prometheus:
  prometheusSpec:
    retention: 6h
    scrapeInterval: 30s
    evaluationInterval: 30s
    # Discover ServiceMonitors / PodMonitors / PrometheusRules in ALL namespaces
    # (the Reckon app ships ServiceMonitors in the `reckon` namespace).
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    # Ephemeral storage — nothing to clean up on teardown.
    storageSpec: {}
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi

# ---------------------------------------------------------------------------
# Grafana — LoadBalancer so the dashboards have a real URL for the screenshot.
# Dashboards are provisioned as code via the sidecar: any ConfigMap labelled
# `grafana_dashboard=1` in any namespace is loaded automatically (zero clicks).
# ---------------------------------------------------------------------------
grafana:
  enabled: true
  # Placeholder — overridden at install with --set from $GRAFANA_ADMIN_PASSWORD.
  adminPassword: reckon-admin
  defaultDashboardsEnabled: false
  service:
    type: LoadBalancer
    port: 80
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
    datasources:
      enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

# ---------------------------------------------------------------------------
# Alertmanager — one real email receiver so PipelineFreshnessBreach actually
# notifies. SMTP settings are placeholders here; the real Gmail app password,
# sender, and recipient are injected at install time via --set (see Makefile).
# ---------------------------------------------------------------------------
alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_from: "alerts@reckon.invalid"        # override: SMTP_FROM
      smtp_auth_username: "alerts@reckon.invalid" # override: SMTP_USER
      smtp_auth_password: "REPLACE_AT_INSTALL"     # override: SMTP_PASSWORD
      smtp_require_tls: true
    route:
      group_by: ["alertname"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
      receiver: "null"
      routes:
        # Route Reckon's critical pipeline alerts to email.
        - matchers:
            - severity = "critical"
          receiver: "email"
          continue: true
    receivers:
      - name: "null"
      - name: "email"
        email_configs:
          - to: "you@example.com"                 # override: ALERT_EMAIL
            send_resolved: true
  alertmanagerSpec:
    storage: {}
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

# ---------------------------------------------------------------------------
# Supporting components — kept, but sized lean.
# ---------------------------------------------------------------------------
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

# ---------------------------------------------------------------------------
# Alert rules ported from observability/prometheus/alerts.yml, now delivered
# as a PrometheusRule CR that the in-cluster Prometheus evaluates.
# ---------------------------------------------------------------------------
additionalPrometheusRulesMap:
  reckon-pipeline:
    groups:
      - name: reckon-pipeline
        rules:
          - alert: PipelineFreshnessBreach
            expr: (time() - pipeline_last_success_timestamp) > 172800
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pipeline has not run successfully in over 48 hours"
              description: >
                The last successful pipeline run was {{ $value | humanizeDuration }} ago.
                Data freshness is breached. Run the pipeline to restore.
          - alert: PipelineDbtTestFailure
            expr: pipeline_dbt_test_results{status="fail"} > 0 or pipeline_dbt_test_results{status="error"} > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "dbt tests failed in the last pipeline run"
              description: >
                {{ $value }} dbt test(s) with status {{ $labels.status }}.
                Check the pipeline logs for details.
