apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reckon.fullname" . }}-api
  labels:
    {{- include "reckon.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: api
          image: {{ .Values.images.api }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
            {{- if .Values.monitoring.enabled }}
            - name: metrics
              containerPort: {{ .Values.monitoring.metricsPort }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "reckon.fullname" . }}-secrets
          {{- if .Values.monitoring.enabled }}
          env:
            - name: OTEL_ENABLED
              value: "true"
            - name: METRICS_PORT
              value: {{ .Values.monitoring.metricsPort | quote }}
          {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
