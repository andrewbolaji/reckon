apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "reckon.fullname" . }}-pipeline
  labels:
    {{- include "reckon.labels" . | nindent 4 }}
    app.kubernetes.io/component: pipeline
spec:
  schedule: {{ .Values.pipeline.schedule | quote }}
  successfulJobsHistoryLimit: {{ .Values.pipeline.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.pipeline.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/component: pipeline
            app.kubernetes.io/instance: {{ .Release.Name }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              image: {{ .Values.images.pipeline }}
              imagePullPolicy: {{ .Values.images.pullPolicy }}
              envFrom:
                - secretRef:
                    name: {{ include "reckon.fullname" . }}-secrets
              env:
                - name: DBT_TARGET
                  value: {{ .Values.pipeline.dbtTarget | quote }}
                {{- if .Values.mongo.enabled }}
                - name: MONGO_URI
                  value: "mongodb://{{ include "reckon.fullname" . }}-mongo:{{ .Values.mongo.port }}"
                - name: MONGO_DB
                  value: {{ .Values.mongo.db | quote }}
                {{- end }}
                {{- if .Values.monitoring.enabled }}
                - name: OTEL_ENABLED
                  value: "true"
                - name: PUSHGATEWAY_URL
                  value: "http://{{ include "reckon.fullname" . }}-pushgateway:{{ .Values.monitoring.pushgateway.port }}"
                {{- end }}
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
