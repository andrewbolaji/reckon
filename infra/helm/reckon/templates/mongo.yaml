{{- if .Values.mongo.enabled }}
# Seeded in-cluster MongoDB for the pipeline's job-records source (ingest step 3).
# Mirrors the local docker-compose `mongo` service: mongo:7 with the seed files
# from mongo/init mounted at /docker-entrypoint-initdb.d, which the image runs on
# first start. Storage is ephemeral (emptyDir) — this is demo data, re-seeded on
# every pod start. Off by default would need a manual deploy; on so `make up`
# yields a complete pipeline with zero manual steps.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "reckon.fullname" . }}-mongo-seed
  labels:
    {{- include "reckon.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongo
data:
{{ (.Files.Glob "files/mongo/*").AsConfig | indent 2 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reckon.fullname" . }}-mongo
  labels:
    {{- include "reckon.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: mongo
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mongo
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: mongo
          image: {{ .Values.mongo.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongo
              containerPort: {{ .Values.mongo.port }}
          volumeMounts:
            - name: seed
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mongo.resources | nindent 12 }}
      volumes:
        - name: seed
          configMap:
            name: {{ include "reckon.fullname" . }}-mongo-seed
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "reckon.fullname" . }}-mongo
  labels:
    {{- include "reckon.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongo
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.mongo.port }}
      targetPort: mongo
      protocol: TCP
      name: mongo
  selector:
    app.kubernetes.io/component: mongo
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
