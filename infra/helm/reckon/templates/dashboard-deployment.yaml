apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reckon.fullname" . }}-dashboard
  labels:
    {{- include "reckon.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: dashboard
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: dashboard
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: dashboard
          image: {{ .Values.images.dashboard }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: {{ .Values.dashboard.port }}
          env:
            - name: VITE_API_URL
              value: "http://{{ include "reckon.fullname" . }}-api:{{ .Values.api.service.port }}"
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.dashboard.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
