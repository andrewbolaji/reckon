# ---- Images ----
images:
  pipeline: reckon-pipeline:latest
  api: reckon-api:latest
  dashboard: reckon-dashboard:latest
  pullPolicy: IfNotPresent

# ---- Warehouse ----
warehouse:
  type: redshift      # "postgres" for local, "redshift" for cloud
  host: ""            # Set via --set or values-prod.yaml
  port: "5439"
  db: "reckon"
  user: "reckon_admin"
  password: ""        # Set via K8s Secret or --set

# ---- Data Lake ----
lake:
  type: s3            # "local" or "s3"
  bucket: ""          # Set via --set
  region: "us-east-1"

# ---- Pipeline CronJob ----
pipeline:
  schedule: "0 */6 * * *"   # Every 6 hours
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  dbtTarget: prod

# ---- Monitoring (in-cluster Prometheus scraping) ----
# When enabled, the app exposes Prometheus metrics and ships ServiceMonitors so
# the kube-prometheus-stack Prometheus scrapes them. The API serves OTel metrics
# on :9464; the pipeline pushes to an in-cluster Pushgateway (below), which
# Prometheus then scrapes. Requires the ServiceMonitor CRD (installed by
# `make monitoring`, which runs before `helm-install` in `make up`).
monitoring:
  enabled: true
  metricsPort: 9464
  pushgateway:
    image: prom/pushgateway:v1.9.0
    port: 9091

# ---- API ----
api:
  replicas: 2
  port: 8000
  service:
    type: LoadBalancer
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---- Dashboard ----
dashboard:
  replicas: 2
  port: 5173
  service:
    type: LoadBalancer
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
