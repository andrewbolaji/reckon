services:
  warehouse:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reckon}
      POSTGRES_USER: ${POSTGRES_USER:-reckon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reckon_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./warehouse/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reckon"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok", "--quiet"]
      interval: 5s
      timeout: 3s
      retries: 10

  pipeline:
    build:
      context: .
      dockerfile: infra/docker/pipeline.Dockerfile
    depends_on:
      warehouse:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      WAREHOUSE_TYPE: ${WAREHOUSE_TYPE:-postgres}
      POSTGRES_HOST: ${POSTGRES_HOST:-warehouse}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-reckon}
      POSTGRES_USER: ${POSTGRES_USER:-reckon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reckon_dev}
      DATA_LAKE_TYPE: ${DATA_LAKE_TYPE:-local}
      DATA_LAKE_PATH: ${DATA_LAKE_PATH:-/data/lake}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB: ${MONGO_DB:-reckon}
      REFERENCE_DATE: ${REFERENCE_DATE:-2026-07-16T12:00:00}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      PUSHGATEWAY_URL: ${PUSHGATEWAY_URL:-http://pushgateway:9091}
    volumes:
      - lake_data:/data/lake

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      pipeline:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
      - "${METRICS_PORT:-9464}:${METRICS_PORT:-9464}"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-warehouse}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-reckon}
      POSTGRES_USER: ${POSTGRES_USER:-reckon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reckon_dev}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      METRICS_PORT: ${METRICS_PORT:-9464}

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "5173:5173"

  metabase:
    image: metabase/metabase:latest
    depends_on:
      pipeline:
        condition: service_completed_successfully
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: h2
      MB_SETUP_TOKEN: ${MB_SETUP_TOKEN:-replace-me-with-a-real-token}
    volumes:
      - metabase_data:/metabase-data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # --- Observability (docker compose --profile observability up) ---

  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: [observability]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=72h"

  pushgateway:
    image: prom/pushgateway:v1.9.0
    profiles: [observability]
    ports:
      - "9091:9091"

  grafana:
    image: grafana/grafana:11.1.0
    profiles: [observability]
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:3.1.0
    profiles: [observability]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.1.0
    profiles: [observability]
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  pgdata:
  mongodata:
  lake_data:
  metabase_data:
  prometheus_data:
  grafana_data:
  loki_data:
