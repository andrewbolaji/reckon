services:
  warehouse:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reckon
      POSTGRES_USER: reckon
      POSTGRES_PASSWORD: reckon_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./warehouse/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reckon"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok", "--quiet"]
      interval: 5s
      timeout: 3s
      retries: 10

  pipeline:
    build:
      context: .
      dockerfile: infra/docker/pipeline.Dockerfile
    depends_on:
      warehouse:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      WAREHOUSE_TYPE: postgres
      POSTGRES_HOST: warehouse
      POSTGRES_PORT: "5432"
      POSTGRES_DB: reckon
      POSTGRES_USER: reckon
      POSTGRES_PASSWORD: reckon_dev
      DATA_LAKE_TYPE: local
      DATA_LAKE_PATH: /data/lake
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: reckon
    volumes:
      - lake_data:/data/lake

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      pipeline:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: warehouse
      POSTGRES_PORT: "5432"
      POSTGRES_DB: reckon
      POSTGRES_USER: reckon
      POSTGRES_PASSWORD: reckon_dev

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "5173:5173"

  metabase:
    image: metabase/metabase:latest
    depends_on:
      pipeline:
        condition: service_completed_successfully
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: h2
      MB_SETUP_TOKEN: ${MB_SETUP_TOKEN:-a]T1%L@sd}
    volumes:
      - metabase_data:/metabase-data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  pgdata:
  mongodata:
  lake_data:
  metabase_data:
